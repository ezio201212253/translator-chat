<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b84ff">
  <title>翻譯即時通</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">

    <!-- 登入 / 房間設定 -->
    <section id="loginPanel" class="panel">
      <h1>翻譯即時通</h1>
      <p class="hint">輸入同一組房號就能和對方聊天，訊息會自動互譯。</p>

      <label>你的名字
        <input id="nameInput" type="text" maxlength="24" placeholder="例如: 王先生 / Pak Ahmad" autocomplete="off">
      </label>

      <label>房號 (英數 4-8 碼)
        <input id="roomInput" type="text" maxlength="8" placeholder="例如: ABC123" autocapitalize="characters" style="text-transform:uppercase">
        <span id="roomHint" class="hint" style="display:none;"></span>
      </label>

      <label>對方看到的語言
        <select id="displayLang">
          <option value="id">印尼文 (Bahasa Indonesia)</option>
          <option value="en">英文 (English)</option>
          <option value="zh-TW">中文 (Chinese)</option>
        </select>
      </label>
      <p class="hint" style="margin: 0; color: #888; font-size: 13px;">
        輸入的語言會自動偵測（中文 / 英文 / 印尼文）
      </p>

      <div class="row">
        <button id="joinBtn" class="primary">加入 / 建立房間</button>
      </div>
      <div class="row">
        <a href="/translate.html" class="link">→ 純翻譯工具（不需對方）</a>
      </div>
    </section>

    <!-- 聊天畫面 -->
    <section id="chatPanel" class="panel hidden">
      <header class="topbar">
        <div>
          <div class="room">房號: <span id="roomDisplay">--</span></div>
          <div class="me">我: <span id="meName">--</span></div>
        </div>
        <div class="topbar-actions" role="group" aria-label="顯示語言">
          <button type="button" class="lang-btn" data-lang="zh-TW">🇹🇼 中文</button>
          <button type="button" class="lang-btn" data-lang="en">🇺🇸 EN</button>
          <button type="button" class="lang-btn" data-lang="id">🇮🇩 ID</button>
          <button type="button" id="leaveBtn" class="leave-btn" aria-label="返回首頁" title="返回首頁">← 返回首頁</button>
        </div>
      </header>

      <div class="expiry-bar" role="group" aria-label="圖片到期時間">
        <span class="expiry-label">圖片保留：</span>
        <button type="button" class="expiry-btn" data-expiry="1h">1 小時</button>
        <button type="button" class="expiry-btn" data-expiry="12h">12 小時</button>
        <button type="button" class="expiry-btn" data-expiry="24h">24 小時</button>
        <button type="button" class="expiry-btn" data-expiry="72h">3 天</button>
        <span class="expiry-hint">（最多 4 張）</span>
      </div>

      <div id="messageList" class="messages" aria-live="polite"></div>

      <div id="imagePreview" class="image-preview hidden"></div>

      <form id="sendForm" class="composer">
        <label class="img-btn" title="拍照或選圖（會自動壓縮，可一次選多張）">
          <input type="file" id="imageInput" accept="image/*" capture="environment" multiple hidden>
          📷
        </label>
        <textarea id="messageInput" placeholder="輸入訊息…（可加圖片說明）" rows="1" maxlength="2000"></textarea>
        <button type="submit" class="primary send-btn" aria-label="送出">➤</button>
      </form>
      <div id="statusLine" class="status">連線中…</div>
    </section>

  </div>
  <script src="/client.js"></script>
</body>
</html>
