<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b84ff">
  <title>翻譯工具</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="translateApp">
    <a href="/" class="back">← 回聊天</a>
    <h1>純翻譯工具</h1>

    <div class="row" style="display:grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: end;">
      <label style="display:flex; flex-direction:column; gap:4px;">
        <span style="font-size:13px; color:#666;">從</span>
        <select id="fromLang">
          <option value="auto">自動偵測</option>
          <option value="zh-TW">中文</option>
          <option value="en">英文</option>
          <option value="id">印尼文</option>
        </select>
      </label>
      <button id="swapBtn" class="swap-btn" title="交換">⇄</button>
      <label style="display:flex; flex-direction:column; gap:4px;">
        <span style="font-size:13px; color:#666;">到</span>
        <select id="toLang">
          <option value="id">印尼文</option>
          <option value="en">英文</option>
          <option value="zh-TW">中文</option>
        </select>
      </label>
    </div>

    <label style="display:flex; flex-direction:column; gap:4px;">
      <span style="font-size:13px; color:#666;">原文</span>
      <textarea id="srcText" placeholder="貼上或輸入要翻譯的文字…"></textarea>
    </label>

    <button id="translateBtn" class="primary">翻譯</button>

    <label style="display:flex; flex-direction:column; gap:4px;">
      <span style="font-size:13px; color:#666;">翻譯結果 <button type="button" id="copyBtn" style="float:right; background:none; border:none; color:#0b84ff; font-size:13px; padding:0;">複製</button></span>
      <textarea id="dstText" readonly placeholder="翻譯結果會出現在這裡"></textarea>
    </label>

    <div id="translateStatus" style="font-size:12px; color:#888; min-height:18px;"></div>
  </div>
  <script src="/translate.js"></script>
</body>
</html>
